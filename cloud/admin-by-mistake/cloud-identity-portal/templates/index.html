<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Identity Portal</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: #111827;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            text-align: center;
            width: 320px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 25px 0;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-main);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: translateY(1px);
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .hint-container {
            margin-top: 25px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .hint-container:hover {
            color: var(--text-main);
        }

        .hint-box {
            display: none;
            margin-top: 12px;
            padding: 12px;
            border-radius: 6px;
            background-color: var(--bg-color);
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .hint-box strong {
            color: var(--accent-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Identity Portal</h1>
    <form method="POST">
        <div class="form-group">
            <label for="password">Access Token</label>
            <input type="text" id="password" name="password" required placeholder="Enter token...">
        </div>
        <button type="submit">Authenticate</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="hint-container" id="hint-btn">Forgot Token?</div>
    <div class="hint-box" id="hint-box">
        Access requires passing through the <strong>{{ hint }}</strong> protocol.
    </div>
</div>

<script>
    document.getElementById('hint-btn').addEventListener('click', function() {
        var box = document.getElementById('hint-box');
        if (box.style.display === 'none' || box.style.display === '') {
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    });
</script>

</body>
</html>
