server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    
	location = / {
        try_files /index.html =404;
    }

    location = /login {
        try_files /index.html =404;
    }
	
	location = /register {
        try_files /index.html =404;
    }
	
	location = /vip-register {
        try_files /index.html =404;
    }
	
	location = /my-vault {
        try_files /index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
