# Nginx configuration for React SPA with security hardening

server {
    listen 80;
    server_name _;
    
    # Performance and security headers
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml+rss;
    gzip_disable "MSIE [1-6]\.";
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Caching strategy
    add_header Cache-Control "public, max-age=3600" always;
    
    # Root and index
    root /usr/share/nginx/html;
    index index.html;
    
    # SPA routing - try file, then directory, then fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Cache busting for index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }
    
    # Static assets with long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        # Cache static assets for 30 days
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        expires 30d;
        access_log off;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to common sensitive files
    location ~ \.(env|sql|sqlite|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
    
    # Logging
    access_log /var/log/nginx/access.log combined buffer=32k;
    error_log /var/log/nginx/error.log warn;
}
