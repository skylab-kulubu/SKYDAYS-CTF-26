name: "default-nsjail-configuration"
description: "Default nsjail configuration for pwnable-style CTF task."

mode: ONCE
uidmap {inside_id: "1000"}
gidmap {inside_id: "1000"}

rlimit_as_type: HARD
rlimit_as: 1024  # Example: 1024 MB RAM limit
rlimit_cpu_type: HARD
rlimit_cpu: 30   # Example: 30 seconds CPU time
rlimit_nofile: 32 # Limit number of open files

time_limit: 60   # Kill connection after 60 seconds

cwd: "/home/user"

mount: [
  {
    src: "/chroot"
    dst: "/"
    is_bind: true
  },
  {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
  },
  # CRITICAL: Bind mount /dev/null and /dev/urandom
  {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
  },
  {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: true
  },
  {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: true
  },
  # Only include /proc if strictly necessary. If you do, make it Read-Only.
  {
    dst: "/proc"
    fstype: "proc"
    rw: false 
  }
]
