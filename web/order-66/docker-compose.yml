services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: order66_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-emperor}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-empire_todos}
      MYSQL_USER: ${MYSQL_USER:-vader}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deathstar}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - order66_network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO
      --max-connections=1000
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-emperor}"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 60s

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.11}
    container_name: order66_backend
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-vader}:${MYSQL_PASSWORD:-deathstar}@mysql:3306/${MYSQL_DATABASE:-empire_todos}?charset=utf8mb4
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-vader}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deathstar}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-empire_todos}
      
      # API Configuration
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_PREFIX: ${API_PREFIX:-/api}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000","http://frontend:3000"]}
      
      # Security Configuration
      SECRET_KEY: ${SECRET_KEY:-execute-order-66-the-empire-strikes-back}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALGORITHM: ${ALGORITHM:-HS256}
      
      # Application Configuration
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_NAME: "${APP_NAME:-Order 66 Execute the Query - CTF Challenge}"
      APP_VERSION: ${APP_VERSION:-1.0.0-CTF}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      
      # Performance Configuration
      WORKER_PROCESSES: ${WORKER_PROCESSES:-1}
      WORKER_CONNECTIONS: ${WORKER_CONNECTIONS:-1000}
      KEEPALIVE_TIMEOUT: ${KEEPALIVE_TIMEOUT:-2}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-16777216}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30}
      
      # CORS Configuration
      ALLOW_CREDENTIALS: ${ALLOW_CREDENTIALS:-true}
      ALLOW_METHODS: ${ALLOW_METHODS:-["*"]}
      ALLOW_HEADERS: ${ALLOW_HEADERS:-["*"]}
      
      # CTF Configuration
      CTF_FLAG: ${CTF_FLAG:-SKYDAYS{SKYORDER_66_HAD_TO_EXECUTED}}
      CTF_FLAG_DESCRIPTION: "${CTF_FLAG_DESCRIPTION:-Execute Order 66 - The hidden Imperial intelligence}"
      ENABLE_SAMPLE_DATA: ${ENABLE_SAMPLE_DATA:-true}
      ENABLE_CTF_ENDPOINTS: ${ENABLE_CTF_ENDPOINTS:-true}
      
      # Health Check Configuration
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-30}
      HEALTH_CHECK_TIMEOUT: ${HEALTH_CHECK_TIMEOUT:-5}
      HEALTH_CHECK_RETRIES: ${HEALTH_CHECK_RETRIES:-3}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app:ro
    networks:
      - order66_network
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 40s

  # Frontend Vue.js + Nginx Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=${NODE_VERSION:-20}
        - NGINX_VERSION=${NGINX_VERSION:-1.24}
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
        - VITE_DEV_MODE=${VITE_DEV_MODE:-false}
    container_name: order66_frontend
    restart: unless-stopped
    environment:
      NGINX_HOST: ${NGINX_HOST:-localhost}
      NGINX_PORT: ${NGINX_PORT:-80}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - order66_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

# Named Volumes
volumes:
  mysql_data:
    driver: local
    name: order66_mysql_data

# Networks
networks:
  order66_network:
    driver: bridge
    name: order66_network