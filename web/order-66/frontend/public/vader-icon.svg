<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="helmet-gradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" style="stop-color:#666;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#000"/>
  
  <!-- Helmet outline -->
  <ellipse cx="16" cy="16" rx="12" ry="14" fill="url(#helmet-gradient)" stroke="#333" stroke-width="1"/>
  
  <!-- Eye pieces -->
  <ellipse cx="12" cy="13" rx="2" ry="3" fill="#ff0000"/>
  <ellipse cx="20" cy="13" rx="2" ry="3" fill="#ff0000"/>
  
  <!-- Breathing apparatus -->
  <rect x="14" y="20" width="4" height="6" rx="1" fill="#333"/>
  <rect x="13" y="22" width="1" height="2" fill="#666"/>
  <rect x="18" y="22" width="1" height="2" fill="#666"/>
  
  <!-- Mouth grille -->
  <rect x="13" y="24" width="6" height="1" fill="#666"/>
  <rect x="13" y="26" width="6" height="1" fill="#666"/>
</svg>